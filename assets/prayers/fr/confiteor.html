<HTML>
<BODY>
Je confesse à Dieu tout-puissant,
<br>je reconnais devant mes frères,
<br>que j'ai péché en pensée, en parole, par action et par omission ;
<br>oui, j'ai vraiment péché.
<br>C'est pourquoi je supplie la Vierge Marie, les anges et tous les saints,
<br>et vous aussi, mes frères,
<br>de prier pour moi le Seigneur notre Dieu.
</BODY>
</HTML>
