Confesso a Deus todo-poderoso
<br>e a vós, irmãos,
<br>que pequei muitas vezes
<br>por pensamentos e palavras, atos e omissões,
<br>por minha culpa, minha culpa, minha tão grande culpa.
<br>E peço à Virgem Maria,
<br>aos anjos e a vós, irmãos,
<br>e a vós, Pai,
<br>que rogueis por mim a Deus, nosso Senhor.
