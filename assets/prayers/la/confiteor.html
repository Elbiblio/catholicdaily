<br></b>Confiteor Deo omnipotenti,
<br>et vobis fratres,
<br>quia peccavi nimis
<br>cogitatione, verbo,
<br>opere et omissione:
<br>mea culpa, mea culpa,
<br>mea maxima culpa.
<br>Ideo precor beatam Mariam semper Virginem,
<br>omnes Angelos et Sanctos,
<br>et vos, fratres,
<br>orare pro me ad Dominum Deum nostrum.
