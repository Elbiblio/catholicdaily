<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#231C17"/>
      <stop offset="1" stop-color="#0F1013"/>
    </linearGradient>
    <radialGradient id="glow3" cx="512" cy="250" r="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg3)"/>
  <rect width="1024" height="500" fill="url(#glow3)"/>

  <!-- Left: Stylized device frame / reading representation -->
  <g transform="translate(80, 70)">
    <!-- Back card -->
    <rect x="20" y="20" width="280" height="400" rx="24" fill="#3C3128" fill-opacity="0.6"/>
    <!-- Front card (App UI representation) -->
    <rect x="0" y="0" width="280" height="400" rx="24" fill="#17120E" stroke="#6A594B" stroke-width="1.5"/>
    
    <!-- UI elements -->
    <rect x="30" y="40" width="220" height="180" rx="16" fill="#8C1D2F" fill-opacity="0.8"/>
    <text x="140" y="100" fill="#D4AF37" font-family="Georgia, serif" font-size="28" font-style="italic" text-anchor="middle">Gospel</text>
    <text x="140" y="140" fill="#F6EBDD" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" letter-spacing="1">JOHN 1:1-14</text>
    <rect x="110" y="170" width="60" height="4" rx="2" fill="#D4AF37"/>
    
    <!-- Text lines -->
    <rect x="30" y="250" width="220" height="8" rx="4" fill="#D1C1AF" fill-opacity="0.5"/>
    <rect x="30" y="275" width="200" height="8" rx="4" fill="#D1C1AF" fill-opacity="0.5"/>
    <rect x="30" y="300" width="210" height="8" rx="4" fill="#D1C1AF" fill-opacity="0.5"/>
    <rect x="30" y="325" width="160" height="8" rx="4" fill="#D1C1AF" fill-opacity="0.5"/>
  </g>

  <!-- Right: Copy -->
  <text x="440" y="200" fill="#F6EBDD" font-family="Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0.5">Catholic Daily</text>
  <text x="440" y="260" fill="#D4AF37" font-family="Georgia, serif" font-size="32" font-style="italic">Prayerful. Beautiful. Offline.</text>
  
  <rect x="440" y="310" width="220" height="48" rx="24" fill="#8C1D2F"/>
  <text x="550" y="340" fill="#F6EBDD" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="1">DAILY MISSAL</text>
</svg>
