name: Mobile CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

env:
  FLUTTER_VERSION: '3.35.1'

jobs:
  verify:
    name: Analyze and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib

      - name: Run tests
        run: flutter test

  android:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_STORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare Android signing
        if: env.HAS_ANDROID_SIGNING == 'true'
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"
          echo "ANDROID_STORE_FILE=$RUNNER_TEMP/release-keystore.jks" >> $GITHUB_ENV
          echo "ANDROID_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Android app bundle
        if: env.HAS_ANDROID_SIGNING == 'true'
        run: flutter build appbundle --release

      - name: Build Android APK
        if: env.HAS_ANDROID_SIGNING == 'true'
        run: flutter build apk --release

      - name: Skip signed Android build when secrets are missing
        if: env.HAS_ANDROID_SIGNING != 'true'
        run: echo "Android signing secrets not configured; skipping signed Android release build."

      - name: Upload Android artifacts
        if: env.HAS_ANDROID_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  ios:
    name: iOS Release Build
    runs-on: macos-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    env:
      HAS_IOS_SIGNING: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 != '' && secrets.IOS_P12_PASSWORD != '' && secrets.IOS_PROVISION_PROFILE_BASE64 != '' && secrets.IOS_KEYCHAIN_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      HAS_TESTFLIGHT_UPLOAD: ${{ secrets.APPSTORE_ISSUER_ID != '' && secrets.APPSTORE_KEY_ID != '' && secrets.APPSTORE_PRIVATE_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: pod install
        working-directory: ios

      - name: Prepare signing assets
        if: env.HAS_IOS_SIGNING == 'true'
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > "$CERT_PATH"
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > "$PROFILE_PATH"
          security create-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${{ secrets.IOS_P12_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS without codesign
        if: env.HAS_IOS_SIGNING != 'true'
        run: flutter build ios --release --no-codesign

      - name: Generate export options
        if: env.HAS_IOS_SIGNING == 'true'
        shell: bash
        run: |
          cat <<EOF > "$RUNNER_TEMP/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build signed iOS IPA
        if: env.HAS_IOS_SIGNING == 'true'
        run: flutter build ipa --release --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      - name: Package iOS build artifacts
        if: env.HAS_IOS_SIGNING != 'true'
        run: |
          mkdir -p build/ios-artifacts
          cp -R build/ios/iphoneos/Runner.app build/ios-artifacts/
        shell: bash

      - name: Package signed iOS artifacts
        if: env.HAS_IOS_SIGNING == 'true'
        run: |
          mkdir -p build/ios-artifacts
          cp -R build/ios/ipa build/ios-artifacts/ipa
        shell: bash

      - name: Prepare App Store Connect API key
        if: env.HAS_IOS_SIGNING == 'true' && env.HAS_TESTFLIGHT_UPLOAD == 'true'
        shell: bash
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat <<'EOF' > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          ${{ secrets.APPSTORE_PRIVATE_KEY }}
          EOF

      - name: Upload to TestFlight
        if: env.HAS_IOS_SIGNING == 'true' && env.HAS_TESTFLIGHT_UPLOAD == 'true'
        run: |
          IPA_PATH=$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n 1)
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
        shell: bash

      - name: Skip TestFlight upload when App Store secrets are missing
        if: env.HAS_IOS_SIGNING == 'true' && env.HAS_TESTFLIGHT_UPLOAD != 'true'
        run: echo "iOS signing is configured, but App Store Connect secrets are missing; skipping TestFlight upload."

      - name: Skip signed iOS build when signing secrets are missing
        if: env.HAS_IOS_SIGNING != 'true'
        run: echo "iOS signing secrets not configured; built unsigned iOS artifacts only."

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-artifacts
          path: build/ios-artifacts
          if-no-files-found: error
